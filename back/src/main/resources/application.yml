server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/incendios_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect
    show-sql: false
    open-in-view: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  jwt:
    secret: ${JWT_SECRET:c2VjcmV0b19kZV9kZXNhcnJvbGxvX211eV9sYXJnb195X3NlZ3Vybw==}
    expiration-ms: 604800000
  huggingface:
    url: ${HF_SPACE_URL:https://usuario-fire-severity-classifier.hf.space}
  uploads:
    path: ${UPLOADS_PATH:./uploads}
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:5173}
