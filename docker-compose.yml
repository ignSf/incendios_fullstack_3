services:
  # ============================================
  # BASE DE DATOS — PostgreSQL 16 + PostGIS
  # ============================================
  db:
    image: postgis/postgis:16-3.4
    container_name: incendios_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: incendios_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_dev_123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d incendios_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # BACKEND — Java 21 + Spring Boot
  # ============================================
  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: incendios_backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DATABASE_URL: jdbc:postgresql://db:5432/incendios_db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres_dev_123}
      JWT_SECRET: ${JWT_SECRET:-c2VjcmV0b19kZV9kZXNhcnJvbGxvX211eV9sYXJnb195X3NlZ3Vybw==}
      FRONTEND_URL: http://localhost:5173
      HF_SPACE_URL: ${HF_SPACE_URL:-https://usuario-fire-severity-classifier.hf.space}
      UPLOADS_PATH: /app/uploads
    ports:
      - "8080:8080"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  # ============================================
  # FRONTEND — React + Vite (dev server)
  # ============================================
  frontend:
    build:
      context: ./front/vite-project
      dockerfile: Dockerfile
    container_name: incendios_frontend
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ./front/vite-project/src:/app/src
      - ./front/vite-project/index.html:/app/index.html
    depends_on:
      - backend

volumes:
  pgdata:
    driver: local
  backend_uploads:
    driver: local
